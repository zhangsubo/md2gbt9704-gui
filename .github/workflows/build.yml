name: Build and Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build:
    name: Build for ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import re; content = open('main.py').read(); match = re.search(r'setApplicationVersion\(\"([^\"]+)\"\)', content); print(match.group(1) if match else '1.0.0')")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          Remove-Item -Path dist -Recurse -Force -ErrorAction SilentlyContinue
          pyinstaller --onedir --noconfirm md2gbt9704.spec
          Compress-Archive -Path 'dist/md2gbt9704/*' -DestinationPath "dist/md2gbt9704_${env:VERSION}_windows.zip" -Force

      - name: Build with PyInstaller (macOS)
        if: matrix.platform == 'macos'
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          rm -rf dist
          pyinstaller --onedir --noconfirm md2gbt9704.spec
          APP_NAME="md2gbt9704"
          mkdir -p "dist/${APP_NAME}.app/Contents/MacOS"
          mkdir -p "dist/${APP_NAME}.app/Contents/Resources"
          cp -r "dist/${APP_NAME}/"* "dist/${APP_NAME}.app/Contents/MacOS/"
          cat > "dist/${APP_NAME}.app/Contents/Info.plist" << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>md2gbt9704</string>
              <key>CFBundleIdentifier</key>
              <string>com.md2gbt9704</string>
              <key>CFBundleName</key>
              <string>md2gbt9704</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          EOF
          cd dist
          zip -r "md2gbt9704_${VERSION}_macos.zip" "${APP_NAME}.app"
          cd ..

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: md2gbt9704_${{ env.VERSION }}_${{ matrix.platform }}
          path: |
            dist/md2gbt9704_${{ env.VERSION }}_windows.zip
            dist/md2gbt9704_${{ env.VERSION }}_macos.zip
          if-no-files-found: error
