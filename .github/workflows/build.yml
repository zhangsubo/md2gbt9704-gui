name: Build and Release

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-windows:
    name: Build for Windows
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get Version
        id: get_version
        shell: bash
        run: |
          VERSION=$(python -c "import re; content = open('main.py', encoding='utf-8').read(); match = re.search(r'setApplicationVersion\(\"([^\"]+)\"\)', content); print(match.group(1) if match else '1.0.0')")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build with PyInstaller
        shell: pwsh
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          Remove-Item -Path dist -Recurse -Force -ErrorAction SilentlyContinue
          pyinstaller --noconfirm md2gbt9704.spec
          Compress-Archive -Path 'dist/md2gbt9704/*' -DestinationPath "dist/md2gbt9704_${env:VERSION}_windows.zip" -Force

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: md2gbt9704_${{ env.VERSION }}_windows
          path: dist/md2gbt9704_${{ env.VERSION }}_windows.zip

  build-macos:
    name: Build for macOS
    runs-on: macos-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Get Version
        id: get_version
        run: |
          VERSION=$(python -c "import re; content = open('main.py', encoding='utf-8').read(); match = re.search(r'setApplicationVersion\(\"([^\"]+)\"\)', content); print(match.group(1) if match else '1.0.0')")
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create Info.plist
        run: |
          mkdir -p md2gbt9704.app/Contents
          cat > md2gbt9704.app/Contents/Info.plist << 'INFOPLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleExecutable</key>
              <string>md2gbt9704</string>
              <key>CFBundleIdentifier</key>
              <string>com.md2gbt9704</string>
              <key>CFBundleName</key>
              <string>md2gbt9704</string>
              <key>CFBundlePackageType</key>
              <string>APPL</string>
              <key>CFBundleShortVersionString</key>
              <string>1.0.0</string>
              <key>CFBundleVersion</key>
              <string>1.0.0</string>
              <key>LSMinimumSystemVersion</key>
              <string>10.13</string>
              <key>NSHighResolutionCapable</key>
              <true/>
          </dict>
          </plist>
          INFOPLIST

      - name: Build with PyInstaller
        env:
          VERSION: ${{ env.VERSION }}
        run: |
          rm -rf dist build
          pyinstaller --noconfirm md2gbt9704.spec
          mkdir -p dist/md2gbt9704.app/Contents/MacOS
          mkdir -p dist/md2gbt9704.app/Contents/Resources
          cp -r dist/md2gbt9704/* dist/md2gbt9704.app/Contents/MacOS/
          cp md2gbt9704.app/Contents/Info.plist dist/md2gbt9704.app/Contents/Info.plist
          cd dist
          zip -r "md2gbt9704_${VERSION}_macos.zip" md2gbt9704.app

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: md2gbt9704_${{ env.VERSION }}_macos
          path: dist/md2gbt9704_${{ env.VERSION }}_macos.zip
